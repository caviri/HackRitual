name: Sync to Hugging Face Space

# Mirrors this repo to the HF Space on every push to main (and on demand).
#
# One-time setup:
#   1. Create a write token: https://huggingface.co/settings/tokens
#   2. Add it as a GitHub Actions secret named HF_TOKEN
#      (repo → Settings → Secrets and variables → Actions → New repository secret)
#
# HF Docker Spaces build the Dockerfile at the repo ROOT, but ours lives at
# tools/image/docker/Dockerfile. This job copies it to ./Dockerfile in the
# ephemeral runner checkout. The COPY paths inside the Dockerfile are
# repo-root-relative, so they resolve fine on HF.
#
# HF's plain git store REJECTS binary files (PNGs, fonts) unless they're in
# Xet/LFS — and it scans the whole pushed history, not just the tip. So we push
# a single ORPHAN commit (no history → no historical binary blobs) with the
# binaries stripped: `static/` is regenerated by the Docker build, and the
# README screenshots are repointed to GitHub raw URLs instead of shipping the
# PNGs to the Space.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stage the Dockerfile at repo root (HF requirement)
        run: cp tools/image/docker/Dockerfile ./Dockerfile

      - name: Prepend the HF Space card to the README
        # HF reads the Space config from YAML frontmatter at the top of README.md.
        # We keep the README clean on GitHub and inject the card only here.
        run: |
          cat hf-space-header.yml README.md > README.hf.md
          mv README.hf.md README.md

      - name: Strip assets HF's plain git rejects (build output + screenshots)
        run: |
          rm -rf static docs/screenshots
          # Keep the README gallery: serve the images from GitHub raw instead of
          # shipping the PNGs to the Space.
          sed -i -E "s#\]\(docs/screenshots/#](https://raw.githubusercontent.com/${{ github.repository }}/main/docs/screenshots/#g" README.md

      - name: Push a clean single-commit snapshot to the HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.name "hf-sync[bot]"
          git config user.email "hf-sync@users.noreply.github.com"
          # Orphan = a root commit with no parents, so the push carries no prior
          # history (and none of the binary blobs it once held).
          git checkout --orphan hf-deploy
          git add -A
          git commit -q -m "Deploy snapshot from ${GITHUB_SHA}"
          git push --force \
            "https://katospiegel:${HF_TOKEN}@huggingface.co/spaces/katospiegel/HackRitual" \
            hf-deploy:main
