version: "3.9"

# =============================================================================
# HackRitual — Local development compose
#
# Usage:
#   cp .env.example .env       # fill in your values
#   docker compose up --build
#
# Backend hot-reload:  source changes are picked up automatically
# Frontend hot-reload: run `cd frontend && npm run dev` separately (port 3000)
#                      The Next.js dev server proxies /api/* to port 7860.
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "7860:7860"
    volumes:
      # Backend hot-reload source mount
      - ./backend:/app/backend
      # Persistent local data
      - ./data:/data
    env_file:
      - .env
    environment:
      # Override DB path to use local ./data volume
      DB_PATH: /data/app.db
      UPLOAD_DIR: /data/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:7860/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
