<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>HackRitual · Scaffold</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
/* ------------------------------------------------------------------ */
/* Reset + Base                                                         */
/* ------------------------------------------------------------------ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d0f14;
  --surface:   #1a1d25;
  --surface2:  #21252f;
  --border:    rgba(255,255,255,0.07);
  --amber:     #f5a623;
  --amber-dim: rgba(245,166,35,0.15);
  --muted:     #6b7280;
  --text:      #e2e8f0;
  --text-dim:  #94a3b8;
  --radius:    12px;
  --header-h:  52px;
  --nav-h:     56px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* ------------------------------------------------------------------ */
/* Layout Shells                                                        */
/* ------------------------------------------------------------------ */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  height: 100vh; /* fallback */
}

header {
  height: var(--header-h);
  min-height: var(--header-h);
  display: flex;
  align-items: center;
  padding: 0 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 10px;
  position: relative;
  z-index: 10;
}

header .logo {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--amber);
}

header .sep { color: var(--border); }

header .subtitle {
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

header .header-status {
  margin-left: auto;
  font-size: 0.7rem;
  color: var(--muted);
}

header .event-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--amber-dim);
  color: var(--amber);
  border: 1px solid rgba(245,166,35,0.3);
  border-radius: 999px;
  padding: 3px 10px;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

main {
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* ------------------------------------------------------------------ */
/* Bottom Navigation                                                    */
/* ------------------------------------------------------------------ */
.bottom-nav {
  display: flex;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  z-index: 10;
}

.bottom-nav button {
  flex: 1;
  min-height: var(--nav-h);
  background: none;
  border: none;
  color: var(--muted);
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 8px 4px 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  transition: color 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.bottom-nav button:active { opacity: 0.7; }
.bottom-nav button.active { color: var(--amber); }

.bottom-nav button svg {
  width: 20px;
  height: 20px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}

/* ------------------------------------------------------------------ */
/* Tab Panels                                                           */
/* ------------------------------------------------------------------ */
.tab-panel {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: none;
}
.tab-panel.active { display: block; }

/* ------------------------------------------------------------------ */
/* BOARD TAB — Kanban                                                   */
/* ------------------------------------------------------------------ */
#tab-board {
  display: none;
  flex-direction: column;
  overflow: hidden;
}
#tab-board.active { display: flex; }

.col-indicator {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  padding: 10px 0 6px;
  flex-shrink: 0;
}

.col-indicator span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border);
  border: 1px solid var(--muted);
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}
.col-indicator span.active {
  background: var(--amber);
  border-color: var(--amber);
  transform: scale(1.3);
}

.board-scroll {
  display: flex;
  flex: 1;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-x: contain;
  scrollbar-width: none;
}
.board-scroll::-webkit-scrollbar { display: none; }

.board-column {
  min-width: 100vw;
  max-width: 100vw;
  scroll-snap-align: start;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 14px 80px;
  flex-shrink: 0;
}

.col-header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 10px 2px 12px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 2;
}

.col-name {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.col-count {
  font-size: 0.65rem;
  color: var(--muted);
  background: var(--surface2);
  border-radius: 999px;
  padding: 1px 7px;
}

.col-header.done    .col-name { color: #4ade80; }
.col-header.in-progress .col-name { color: var(--amber); }
.col-header.todo    .col-name { color: #60a5fa; }
.col-header.backlog .col-name { color: var(--muted); }

/* ------------------------------------------------------------------ */
/* Ticket Cards                                                         */
/* ------------------------------------------------------------------ */
.ticket-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.ticket-card:active { background: var(--surface2); }

.ticket-title {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.3;
}

.ticket-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-items: center;
}

.ticket-est {
  font-size: 0.65rem;
  color: var(--muted);
  margin-left: 2px;
}

/* ------------------------------------------------------------------ */
/* Badges                                                              */
/* ------------------------------------------------------------------ */
.badge {
  display: inline-block;
  border-radius: 999px;
  padding: 2px 8px;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  white-space: nowrap;
}

.badge-id {
  background: var(--surface2);
  color: var(--muted);
  font-family: monospace;
  font-size: 0.7rem;
}

/* Type badges */
.badge-feature { background: #1e3a5f; color: #60a5fa; }
.badge-chore   { background: #2d2b1f; color: #fbbf24; }
.badge-bug     { background: #3b1f1f; color: #f87171; }
.badge-doc     { background: #1f2d2b; color: #34d399; }

/* Size badges */
.badge-xs { background: #1a2520; color: #6ee7b7; }
.badge-s  { background: #1e2a1e; color: #86efac; }
.badge-m  { background: #1b2430; color: #67e8f9; }
.badge-l  { background: #252018; color: #fde68a; }
.badge-xl { background: #2a1818; color: #fca5a5; }

/* ------------------------------------------------------------------ */
/* Slide-in Panel (ticket detail + doc viewer)                         */
/* ------------------------------------------------------------------ */
.panel-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 199;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}
.panel-backdrop.open {
  opacity: 1;
  pointer-events: auto;
}

.slide-panel {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: min(520px, 100vw);
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transform: translateX(100%);
  transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.slide-panel.open { transform: translateX(0); }

.panel-inner {
  padding: 20px 18px 32px;
}

.panel-close {
  display: flex;
  align-items: center;
  gap: 8px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 0.8rem;
  cursor: pointer;
  padding: 4px 0 16px;
  -webkit-tap-highlight-color: transparent;
  margin-bottom: 4px;
}
.panel-close:active { color: var(--text); }
.panel-close svg {
  width: 16px; height: 16px;
  stroke: currentColor; fill: none;
  stroke-width: 2; stroke-linecap: round;
}

.panel-title {
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 10px;
  line-height: 1.3;
}

.panel-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}

.panel-links {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
  font-size: 0.75rem;
  color: var(--text-dim);
}

.panel-links .link-group {
  display: flex;
  align-items: center;
  gap: 4px;
}

.panel-links .link-label {
  color: var(--muted);
}

.panel-divider {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}

/* ------------------------------------------------------------------ */
/* Markdown body                                                        */
/* ------------------------------------------------------------------ */
.md-body { font-size: 0.88rem; line-height: 1.7; color: var(--text-dim); }
.md-body h1 { font-size: 1.1rem; color: var(--amber); margin: 20px 0 10px; }
.md-body h2 { font-size: 0.95rem; color: var(--text); margin: 18px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.md-body h3 { font-size: 0.88rem; color: var(--text-dim); margin: 14px 0 6px; }
.md-body p  { margin-bottom: 10px; }
.md-body ul, .md-body ol { padding-left: 18px; margin-bottom: 10px; }
.md-body li { margin-bottom: 3px; }
.md-body li input[type=checkbox] { margin-right: 6px; }
.md-body code {
  background: #0a0c12;
  color: #a5f3fc;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 0.82rem;
}
.md-body pre {
  background: #0a0c12;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  overflow-x: auto;
  margin-bottom: 12px;
}
.md-body pre code { background: none; padding: 0; color: #e2e8f0; }
.md-body table { border-collapse: collapse; width: 100%; margin-bottom: 12px; font-size: 0.82rem; }
.md-body th { background: var(--surface2); color: var(--text); padding: 7px 10px; text-align: left; border: 1px solid var(--border); }
.md-body td { padding: 6px 10px; border: 1px solid var(--border); color: var(--text-dim); }
.md-body blockquote { border-left: 3px solid var(--amber); padding-left: 12px; margin: 10px 0; color: var(--muted); font-style: italic; }
.md-body a { color: var(--amber); text-decoration: none; }
.md-body a:hover { text-decoration: underline; }
.md-body strong { color: var(--text); font-weight: 600; }

/* ------------------------------------------------------------------ */
/* Docs Tab                                                             */
/* ------------------------------------------------------------------ */
.doc-list { padding: 12px 14px 80px; }

.doc-group-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 12px 0 6px;
}

.doc-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
  min-height: 52px;
}
.doc-item:active { background: var(--surface2); }

.doc-item svg {
  width: 18px; height: 18px;
  stroke: var(--muted); fill: none;
  stroke-width: 1.8; stroke-linecap: round;
  flex-shrink: 0;
}

.doc-item-title {
  font-size: 0.88rem;
  color: var(--text);
  flex: 1;
}

.doc-item-arrow {
  color: var(--muted);
  font-size: 0.8rem;
}

/* ------------------------------------------------------------------ */
/* Status Tab                                                           */
/* ------------------------------------------------------------------ */
.status-body { padding: 14px 14px 80px; }

.status-section-title {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 12px 0 8px;
}

.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.stat-value {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}

.stat-label {
  font-size: 0.68rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.stat-card.done .stat-value    { color: #4ade80; }
.stat-card.progress .stat-value { color: var(--amber); }
.stat-card.todo .stat-value    { color: #60a5fa; }
.stat-card.backlog .stat-value { color: var(--muted); }

.progress-track {
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
  margin: 10px 0 16px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #4ade80, var(--amber));
  border-radius: 3px;
  transition: width 0.6s ease;
}

.event-state-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.event-state-label { font-size: 0.75rem; color: var(--muted); }

.state-pill {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-radius: 999px;
  padding: 4px 12px;
}
.state-DRAFT    { background: #2d2b1f; color: #fbbf24; }
.state-OPEN     { background: #1a2f1a; color: #4ade80; }
.state-FROZEN   { background: #1a2530; color: #67e8f9; }
.state-FINAL    { background: #2a1f35; color: #c084fc; }
.state-ARCHIVED { background: #1f1f1f; color: #9ca3af; }
.state-unknown  { background: var(--surface2); color: var(--muted); }

.links-section a {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 8px;
  color: var(--text-dim);
  text-decoration: none;
  font-size: 0.83rem;
  transition: border-color 0.15s;
}
.links-section a:active { background: var(--surface2); }
.links-section a svg {
  width: 16px; height: 16px;
  stroke: var(--muted); fill: none;
  stroke-width: 1.8; stroke-linecap: round;
  flex-shrink: 0;
}

/* ------------------------------------------------------------------ */
/* Log Tab                                                              */
/* ------------------------------------------------------------------ */
.log-body { padding: 14px 14px 80px; }

/* ------------------------------------------------------------------ */
/* Loading / Error States                                               */
/* ------------------------------------------------------------------ */
.loading-state {
  padding: 48px 24px;
  text-align: center;
  color: var(--muted);
  font-size: 0.82rem;
}

.loading-spinner {
  width: 28px;
  height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--amber);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-state {
  padding: 48px 24px;
  text-align: center;
  color: #f87171;
  font-size: 0.82rem;
}

/* ------------------------------------------------------------------ */
/* Responsive (tablet+)                                                 */
/* ------------------------------------------------------------------ */
@media (min-width: 640px) {
  .board-column { min-width: 480px; max-width: 480px; }
  .stat-grid { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <span class="logo">HackRitual</span>
    <span class="sep">·</span>
    <span class="subtitle">Scaffold</span>
    <div class="header-status" id="header-state">
      <span class="event-badge" id="event-badge">loading…</span>
    </div>
  </header>

  <!-- Main content area -->
  <main>

    <!-- BOARD TAB -->
    <section id="tab-board" class="tab-panel active" role="tabpanel">
      <div class="col-indicator" id="col-dots">
        <span class="active" title="Done"></span>
        <span title="In Progress"></span>
        <span title="Todo"></span>
        <span title="Backlog"></span>
      </div>
      <div class="board-scroll" id="board-scroll">
        <div class="board-column" id="col-done">
          <div class="col-header done">
            <span class="col-name">Done</span>
            <span class="col-count" id="count-done">0</span>
          </div>
          <div class="loading-state"><div class="loading-spinner"></div>Summoning…</div>
        </div>
        <div class="board-column" id="col-in-progress">
          <div class="col-header in-progress">
            <span class="col-name">In Progress</span>
            <span class="col-count" id="count-in-progress">0</span>
          </div>
          <div class="loading-state"><div class="loading-spinner"></div>Summoning…</div>
        </div>
        <div class="board-column" id="col-todo">
          <div class="col-header todo">
            <span class="col-name">Todo</span>
            <span class="col-count" id="count-todo">0</span>
          </div>
          <div class="loading-state"><div class="loading-spinner"></div>Summoning…</div>
        </div>
        <div class="board-column" id="col-backlog">
          <div class="col-header backlog">
            <span class="col-name">Backlog</span>
            <span class="col-count" id="count-backlog">0</span>
          </div>
          <div class="loading-state"><div class="loading-spinner"></div>Summoning…</div>
        </div>
      </div>
    </section>

    <!-- DOCS TAB -->
    <section id="tab-docs" class="tab-panel" role="tabpanel">
      <div class="doc-list" id="docs-list">
        <div class="loading-state"><div class="loading-spinner"></div>Loading grimoire…</div>
      </div>
    </section>

    <!-- LOG TAB -->
    <section id="tab-log" class="tab-panel" role="tabpanel">
      <div class="log-body">
        <div class="md-body" id="log-content">
          <div class="loading-state"><div class="loading-spinner"></div>Unrolling the chronicle…</div>
        </div>
      </div>
    </section>

    <!-- STATUS TAB -->
    <section id="tab-status" class="tab-panel" role="tabpanel">
      <div class="status-body" id="status-body">
        <div class="loading-state"><div class="loading-spinner"></div>Reading the stone…</div>
      </div>
    </section>

  </main>

  <!-- Bottom navigation -->
  <nav class="bottom-nav" role="tablist">
    <button class="active" data-tab="board" role="tab" aria-selected="true">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Board
    </button>
    <button data-tab="docs" role="tab" aria-selected="false">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
      Docs
    </button>
    <button data-tab="log" role="tab" aria-selected="false">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Log
    </button>
    <button data-tab="status" role="tab" aria-selected="false">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Status
    </button>
  </nav>

</div>

<!-- Slide-in panel backdrop + panel -->
<div class="panel-backdrop" id="panel-backdrop"></div>
<aside class="slide-panel" id="slide-panel" role="dialog" aria-modal="true">
  <div class="panel-inner" id="panel-inner">
    <!-- content injected by JS -->
  </div>
</aside>

<script>
/* ------------------------------------------------------------------ */
/* State                                                                */
/* ------------------------------------------------------------------ */
const S = {
  tab: 'board',
  tickets: null,
  docsList: null,
  logLoaded: false,
  statusLoaded: false,
  cache: {},
  boardCol: 0,
};

const COLS = ['done', 'in-progress', 'todo', 'backlog'];

/* ------------------------------------------------------------------ */
/* API                                                                  */
/* ------------------------------------------------------------------ */
async function api(path, bust = false) {
  if (!bust && S.cache[path]) return S.cache[path];
  const r = await fetch('/api/scaffold' + path);
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  const d = await r.json();
  S.cache[path] = d;
  return d;
}

/* ------------------------------------------------------------------ */
/* Utilities                                                            */
/* ------------------------------------------------------------------ */
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function badge(cls, text) {
  return `<span class="badge badge-${esc(cls)}">${esc(text)}</span>`;
}

function typeColor(t) {
  const map = { feature:'feature', chore:'chore', bug:'bug', doc:'doc' };
  return map[t] || 'chore';
}

function sizeColor(s) {
  const map = { XS:'xs', S:'s', M:'m', L:'l', XL:'xl' };
  return map[(s||'').toUpperCase()] || 'm';
}

/* ------------------------------------------------------------------ */
/* Marked config                                                        */
/* ------------------------------------------------------------------ */
if (typeof marked !== 'undefined') {
  marked.setOptions({ breaks: true, gfm: true });
}

function renderMd(text) {
  if (typeof marked === 'undefined') return `<pre>${esc(text)}</pre>`;
  return marked.parse(text || '');
}

/* ------------------------------------------------------------------ */
/* Tab switching                                                        */
/* ------------------------------------------------------------------ */
function switchTab(tab) {
  if (S.tab === tab) return;
  S.tab = tab;

  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');

  document.querySelectorAll('.bottom-nav button').forEach(b => {
    const active = b.dataset.tab === tab;
    b.classList.toggle('active', active);
    b.setAttribute('aria-selected', active);
  });

  if (tab === 'board' && !S.tickets) loadBoard();
  if (tab === 'docs' && !S.docsList) loadDocs();
  if (tab === 'log' && !S.logLoaded) loadLog();
  if (tab === 'status') loadStatus();
}

/* ------------------------------------------------------------------ */
/* Board                                                                */
/* ------------------------------------------------------------------ */
async function loadBoard() {
  try {
    const tickets = await api('/tickets');
    S.tickets = tickets;
    renderBoard(tickets);
    loadStatusBadge();
  } catch (e) {
    document.getElementById('col-done').innerHTML +=
      `<div class="error-state">Failed to load tickets: ${esc(e.message)}</div>`;
  }
}

function renderBoard(tickets) {
  COLS.forEach(col => {
    const colTickets = tickets.filter(t => t.column === col);
    const colId = 'col-' + col;
    const el = document.getElementById(colId);
    const headerHTML = el.querySelector('.col-header').outerHTML;
    document.getElementById('count-' + col).textContent = colTickets.length;
    el.innerHTML = headerHTML + (
      colTickets.length
        ? colTickets.map(renderCard).join('')
        : `<div class="loading-state" style="padding-top:32px;color:var(--muted)">No tickets</div>`
    );
  });
}

function renderCard(t) {
  return `<div class="ticket-card" data-action="open-ticket" data-id="${esc(t.id)}">
    <div class="ticket-title">${esc(t.title)}</div>
    <div class="ticket-meta">
      ${badge('id', '#' + (t.id || '?'))}
      ${t.type ? badge(typeColor(t.type), t.type) : ''}
      ${t.size ? badge(sizeColor(t.size), t.size) : ''}
      ${t.estimate ? `<span class="ticket-est">${esc(t.estimate)}</span>` : ''}
    </div>
  </div>`;
}

/* ------------------------------------------------------------------ */
/* Ticket detail panel                                                  */
/* ------------------------------------------------------------------ */
async function openTicket(id) {
  openPanel('<div class="loading-state"><div class="loading-spinner"></div>Summoning…</div>');
  try {
    const t = await api('/tickets/' + id);
    renderTicketPanel(t);
  } catch (e) {
    renderPanelError('Could not load ticket ' + id, e.message);
  }
}

function renderTicketPanel(t) {
  const deps = (t.depends_on || []).map(d => badge('id', '#' + d)).join(' ');
  const blocks = (t.blocks || []).map(b => badge('id', '#' + b)).join(' ');
  const body = renderMd(t._body || '');

  document.getElementById('panel-inner').innerHTML = `
    <button class="panel-close" data-action="close-panel">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
      Board
    </button>
    <div class="panel-title">${esc(t.title || 'Untitled')}</div>
    <div class="panel-meta">
      ${badge('id', '#' + (t.id || '?'))}
      ${t.type ? badge(typeColor(t.type), t.type) : ''}
      ${t.size ? badge(sizeColor(t.size), t.size) : ''}
      ${t.status ? badge('', t.status) : ''}
      ${t.estimate ? `<span class="ticket-est">${esc(t.estimate)}</span>` : ''}
    </div>
    ${deps ? `<div class="panel-links"><div class="link-group"><span class="link-label">Depends on:</span> ${deps}</div></div>` : ''}
    ${blocks ? `<div class="panel-links"><div class="link-group"><span class="link-label">Blocks:</span> ${blocks}</div></div>` : ''}
    ${t.spec ? `<div class="panel-links"><span class="link-label">Spec:</span> <code style="font-size:0.72rem">${esc(t.spec)}</code></div>` : ''}
    <div class="panel-divider"></div>
    <div class="md-body">${body}</div>
  `;
}

/* ------------------------------------------------------------------ */
/* Docs                                                                 */
/* ------------------------------------------------------------------ */
async function loadDocs() {
  try {
    const docs = await api('/docs');
    S.docsList = docs;
    renderDocsList(docs);
  } catch (e) {
    document.getElementById('docs-list').innerHTML =
      `<div class="error-state">Failed to load docs: ${esc(e.message)}</div>`;
  }
}

function renderDocsList(docs) {
  const groups = { docs: [], root: [] };
  docs.forEach(d => (groups[d.group] || groups.root).push(d));

  const fileIcon = `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>`;

  let html = '';
  if (groups.docs.length) {
    html += `<div class="doc-group-label">Documentation</div>`;
    html += groups.docs.map(d => `
      <div class="doc-item" data-action="open-doc" data-file="${esc(d.filename)}">
        ${fileIcon}
        <span class="doc-item-title">${esc(d.title)}</span>
        <span class="doc-item-arrow">›</span>
      </div>`).join('');
  }
  if (groups.root.length) {
    html += `<div class="doc-group-label">Project files</div>`;
    html += groups.root.map(d => `
      <div class="doc-item" data-action="open-doc" data-file="${esc(d.filename)}">
        ${fileIcon}
        <span class="doc-item-title">${esc(d.title)}</span>
        <span class="doc-item-arrow">›</span>
      </div>`).join('');
  }
  document.getElementById('docs-list').innerHTML = html || '<div class="loading-state">No docs found.</div>';
}

async function openDoc(filename) {
  openPanel('<div class="loading-state"><div class="loading-spinner"></div>Loading…</div>');
  try {
    const doc = await api('/docs/' + encodeURIComponent(filename));
    document.getElementById('panel-inner').innerHTML = `
      <button class="panel-close" data-action="close-panel">
        <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
        Docs
      </button>
      <div class="panel-divider"></div>
      <div class="md-body">${renderMd(doc.content)}</div>
    `;
  } catch (e) {
    renderPanelError('Could not load ' + filename, e.message);
  }
}

/* ------------------------------------------------------------------ */
/* Log tab                                                              */
/* ------------------------------------------------------------------ */
async function loadLog() {
  S.logLoaded = true;
  try {
    const doc = await api('/docs/CHANGELOG.md');
    document.getElementById('log-content').innerHTML = renderMd(doc.content);
  } catch (e) {
    document.getElementById('log-content').innerHTML =
      `<div class="error-state">Failed to load changelog: ${esc(e.message)}</div>`;
  }
}

/* ------------------------------------------------------------------ */
/* Status tab                                                           */
/* ------------------------------------------------------------------ */
async function loadStatus() {
  const el = document.getElementById('status-body');
  try {
    const d = await api('/status', true); // always fresh
    const s = d.steps || {};
    const pct = s.total ? Math.round((s.done / s.total) * 100) : 0;

    el.innerHTML = `
      <div class="status-section-title">Ritual Progress</div>
      <div class="stat-grid">
        <div class="stat-card done">
          <div class="stat-value">${s.done ?? 0}</div>
          <div class="stat-label">Done</div>
        </div>
        <div class="stat-card progress">
          <div class="stat-value">${s.in_progress ?? 0}</div>
          <div class="stat-label">In Progress</div>
        </div>
        <div class="stat-card todo">
          <div class="stat-value">${s.todo ?? 0}</div>
          <div class="stat-label">Todo</div>
        </div>
        <div class="stat-card backlog">
          <div class="stat-value">${s.backlog ?? 0}</div>
          <div class="stat-label">Backlog</div>
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>

      <div class="status-section-title">Event State</div>
      <div class="event-state-card">
        <span class="event-state-label">${esc(d.event_id || 'Event')}</span>
        <span class="state-pill state-${esc(d.event_state || 'unknown')}">${esc(d.event_state || 'unknown')}</span>
      </div>

      <div class="status-section-title">Links</div>
      <div class="links-section">
        <a href="/api/docs" target="_blank">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          OpenAPI (Swagger UI)
        </a>
        <a href="/api/redoc" target="_blank">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
          ReDoc API Reference
        </a>
        <a href="/api/health" target="_blank">
          <svg viewBox="0 0 24 24"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
          Health Check
        </a>
      </div>
    `;
  } catch (e) {
    el.innerHTML = `<div class="error-state">Failed to load status: ${esc(e.message)}</div>`;
  }
}

async function loadStatusBadge() {
  try {
    const d = await api('/status');
    const badge = document.getElementById('event-badge');
    if (badge) badge.textContent = d.event_state || 'unknown';
  } catch (_) {}
}

/* ------------------------------------------------------------------ */
/* Panel helpers                                                        */
/* ------------------------------------------------------------------ */
function openPanel(content) {
  document.getElementById('panel-inner').innerHTML = content;
  document.getElementById('slide-panel').classList.add('open');
  document.getElementById('panel-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  document.getElementById('slide-panel').classList.remove('open');
  document.getElementById('panel-backdrop').classList.remove('open');
  document.body.style.overflow = '';
}

function renderPanelError(title, detail) {
  document.getElementById('panel-inner').innerHTML = `
    <button class="panel-close" data-action="close-panel">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
      Back
    </button>
    <div class="error-state">${esc(title)}<br><small>${esc(detail)}</small></div>
  `;
}

/* ------------------------------------------------------------------ */
/* Event delegation                                                     */
/* ------------------------------------------------------------------ */
document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const { action, tab, id, file } = el.dataset;

  if (action === 'close-panel') closePanel();
  if (action === 'open-ticket') openTicket(id);
  if (action === 'open-doc') openDoc(file);
});

document.querySelectorAll('.bottom-nav button').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

document.getElementById('panel-backdrop').addEventListener('click', closePanel);

/* ------------------------------------------------------------------ */
/* Board column dot indicator (scroll listener)                         */
/* ------------------------------------------------------------------ */
const boardScroll = document.getElementById('board-scroll');
const dots = document.querySelectorAll('.col-indicator span');

boardScroll.addEventListener('scroll', () => {
  const col = Math.round(boardScroll.scrollLeft / boardScroll.clientWidth);
  if (col !== S.boardCol) {
    S.boardCol = col;
    dots.forEach((d, i) => d.classList.toggle('active', i === col));
  }
}, { passive: true });

/* ------------------------------------------------------------------ */
/* Keyboard: Escape closes panel                                        */
/* ------------------------------------------------------------------ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
});

/* ------------------------------------------------------------------ */
/* Init                                                                 */
/* ------------------------------------------------------------------ */
loadBoard();
loadStatusBadge();
</script>
</body>
</html>
